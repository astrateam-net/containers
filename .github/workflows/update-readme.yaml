---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update README

on:
  push:
    branches: ["main"]
    paths:
      - "apps/**/docker-bake.hcl"
      - "apps/*/Dockerfile"
  workflow_dispatch:

jobs:
  update:
    name: Update README
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Extract Versions and Update README
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const appsDir = path.resolve(process.cwd(), 'apps');
            const apps = fs.readdirSync(appsDir, { withFileTypes: true })
              .filter(e => e.isDirectory())
              .map(e => e.name)
              .sort();

            const rows = apps.map(name => {
              const bakePath = path.join(appsDir, name, 'docker-bake.hcl');
              let version = '—';
              if (fs.existsSync(bakePath)) {
                const content = fs.readFileSync(bakePath, 'utf8');
                const match = content.match(/variable\s+"VERSION"\s*\{[^}]*default\s*=\s*"([^"]+)"/s);
                if (match) version = match[1];
              }
              const image = `\`ghcr.io/${{ github.repository_owner }}/${name}\``;
              return `| [${name}](apps/${name}/) | ${image} | \`${version}\` |`;
            });

            const table = [
              '| App | Image | Version |',
              '|-----|-------|---------|',
              ...rows,
            ].join('\n');

            const readmePath = path.resolve(process.cwd(), 'README.md');
            let readme = fs.readFileSync(readmePath, 'utf8');

            // Replace content between the Images section header and the next --- divider
            const updated = readme.replace(
              /(## Images\n\n)[\s\S]*?(\n\n---)/,
              `$1${table}$2`
            );

            if (updated === readme) {
              core.info('README already up to date, no changes needed.');
              return;
            }

            fs.writeFileSync(readmePath, updated);
            core.info('README.md updated with current versions.');

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "No changes to commit."
          else
            git add README.md
            git commit -m "docs: update README app version table [skip ci]"
            git push
          fi
