---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Application Inventory
description: Return a JSON array of app names from the apps directory

outputs:
  apps:
    description: Application Inventory
    value: ${{ steps.inventory.outputs.apps }}

runs:
  using: composite
  steps:
    - name: Application Inventory
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      id: inventory
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          function scanDirectory(dirPath) {
              try {
                  const entries = fs.readdirSync(dirPath, { withFileTypes: true });
                  const required = ['Dockerfile', 'docker-bake.hcl', 'tests.yaml'];
                  return entries
                      .filter((entry) => entry.isDirectory())
                      .map((entry) => entry.name)
                      .filter((name) =>
                          required.every((file) =>
                              fs.existsSync(path.join(dirPath, name, file))
                          )
                      );
              } catch (error) {
                  core.setFailed(`Error reading directory ${dirPath}: ${error.message}`);
                  return [];
              }
          }

          const appsDirectory = path.resolve(process.cwd(), 'apps');
          const apps = scanDirectory(appsDirectory).sort();
          core.setOutput('apps', JSON.stringify(apps));
