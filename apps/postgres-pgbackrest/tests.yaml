schemaVersion: "2.0.0"

commandTests:
  - name: postgres is available
    command: postgres
    args: ["--version"]
    exitCode: 0
    expectedOutput:
      - "PostgreSQL 17.8"

  - name: pgbackrest is available
    command: pgbackrest
    args: ["version"]
    exitCode: 0
    expectedOutput:
      - "pgBackRest"

  - name: ca bundle is present
    command: sh
    args: ["-lc", "test -s /etc/ssl/certs/ca-certificates.crt"]
    exitCode: 0
