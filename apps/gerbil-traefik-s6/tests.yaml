# Container Structure Test (schemaVersion present => CST, not GOSS).
# Structural only: the runtime needs NET_ADMIN + wg0 + an external Pangolin,
# none of which exist in the CI build sandbox, so we assert the image is
# assembled correctly rather than booting s6.
schemaVersion: "2.0.0"

fileExistenceTests:
  - name: gerbil binary
    path: /usr/local/bin/gerbil
    shouldExist: true
    permissions: "-rwxr-xr-x"
  - name: traefik binary
    path: /usr/local/bin/traefik
    shouldExist: true
  - name: s6 init
    path: /init
    shouldExist: true
  - name: gerbil run script
    path: /etc/s6-overlay/s6-rc.d/gerbil/run
    shouldExist: true
    permissions: "-rwxr-xr-x"
  - name: traefik run script
    path: /etc/s6-overlay/s6-rc.d/traefik/run
    shouldExist: true
    permissions: "-rwxr-xr-x"
  - name: healthcheck
    path: /usr/bin/healthcheck.sh
    shouldExist: true
    permissions: "-rwxr-xr-x"

commandTests:
  - name: traefik version
    command: /usr/local/bin/traefik
    args: ["version"]
    exitCode: 0
