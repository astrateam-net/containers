schemaVersion: "2.0.0"

# Structural only — authentik needs PostgreSQL + Redis to boot, so we verify the two

fileExistenceTests:
  - name: authentik-server binary
    path: /usr/bin/authentik-server
    shouldExist: true
  - name: enterprise license module present
    path: /authentik/enterprise/license.py
    shouldExist: true

commandTests:
  - name: authentik-server is executable
    command: sh
    args: ["-lc", "test -x /usr/bin/authentik-server"]
    exitCode: 0

  # cap_net_bind_service must survive into the final layer (os.getxattr raises if absent).
  - name: cap_net_bind_service attached to binary
    command: sh
    args:
      - "-lc"
      - "python3 -c \"import os; os.getxattr('/usr/bin/authentik-server', 'security.capability')\""
    exitCode: 0

  # Enterprise fix: status() short-circuits to VALID.
  - name: status forced valid
    command: sh
    args:
      - "-lc"
      - "grep -A1 'def status(self) -> LicenseUsageStatus:' /authentik/enterprise/license.py | grep -q 'return LicenseUsageStatus.VALID'"
    exitCode: 0

  # Enterprise fix: cached_summary() returns a forged VALID summary.
  - name: cached_summary forged valid
    command: sh
    args:
      - "-lc"
      - "grep -q 'internal_users=999999' /authentik/enterprise/license.py"
    exitCode: 0
