<div class="launch-container" #sessionContainer>
  <!-- The <iron-remote-desktop> element is created PROGRAMMATICALLY in
       initiateRemoteClientListener(), NOT declared here: the svelte custom element
       mounts in a microtask queued at DOM connection and dispatches 'ready' once,
       which on this route races Angular's lifecycle. Creating it by hand lets us
       attach the 'ready' listener BEFORE appendChild. Everything the session does
       afterwards is the inherited Devolutions WebClientRdpComponent — only the
       authentication (credential injection) and this wiring are ours. -->

  <!-- The gateway's native floating session toolbar — identical bindings to the
       stock RDP tab; every handler is inherited from WebClientRdpComponent. -->
  @if (!loading && !currentStatus.isDisabled) {
    <div class="toolbar-overlay-anchor">
      <rdp-toolbar-wrapper
        [remoteClient]="remoteClient"
        [actions]="clipboardActionButtons"
        [sessionInfo]="sessionInfo"
        [dynamicResizeSupported]="dynamicResizeSupported"
        [initialState]="{ dynamicResize: dynamicResizeEnabled, unicodeKeyboard: useUnicodeKeyboard, cursorCrosshair: cursorOverrideActive }"
        (sessionClose)="startTerminationProcess()"
        (screenModeChange)="handleScreenModeChange($event)"
        (dynamicResizeChange)="onDynamicResizeChange($event)"
        (cursorCrosshairChange)="onCursorCrosshairChange($event)">
      </rdp-toolbar-wrapper>
    </div>
  }

  <!-- Status overlays driven by the inherited session lifecycle state. -->
  @if (loading && !currentStatus.isDisabled) {
    <div class="launch-overlay" role="status">
      <div class="launch-spinner"></div>
      <p>Connecting…</p>
    </div>
  } @else if (currentStatus.isDisabled) {
    <div
      class="launch-overlay"
      [class.launch-error]="sessionTerminationMessage?.severity === 'error'"
      role="status">
      <p>{{ sessionTerminationMessage?.summary ?? 'Session ended' }}</p>
      @if (sessionTerminationMessage?.detail) {
        <p class="launch-detail">{{ sessionTerminationMessage?.detail }}</p>
      }
    </div>
  }
</div>
