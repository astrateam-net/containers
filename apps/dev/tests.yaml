schemaVersion: "2.0.0"

# Structural test only — the coder server needs PostgreSQL to run, so we verify
# the build (patched binary present, executable, correctly version-stamped)
# rather than booting the app.

fileExistenceTests:
  - name: coder binary
    path: /opt/coder
    shouldExist: true

commandTests:
  - name: coder binary is executable
    command: sh
    args: ["-lc", "test -x /opt/coder"]
    exitCode: 0

  # Confirms the from-source build produced a working binary stamped with the
  # stable version (buildinfo.tag), not a "devel" fallback.
  - name: coder reports the stable version
    command: sh
    args:
      - "-lc"
      - "/opt/coder version | grep -q 2.34.0"
    exitCode: 0

  # The setcap'd security.capability xattr must survive into the final layer.
  # getcap (from libcap) prints the binary only when a capability is attached,
  # so grepping for cap_net_bind_service proves the overlay took effect.
  - name: cap_net_bind_service attached to binary
    command: sh
    args:
      - "-lc"
      - "getcap /opt/coder | grep -q cap_net_bind_service"
    exitCode: 0
