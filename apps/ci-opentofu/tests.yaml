---
schemaVersion: "2.0.0"

commandTests:
  - name: "tofu is installed"
    command: "tofu"
    args: ["version"]
    expectedOutput: ["OpenTofu v"]
    exitCode: 0

  - name: "jq is installed"
    command: "jq"
    args: ["--version"]
    exitCode: 0

  - name: "git is installed"
    command: "git"
    args: ["--version"]
    exitCode: 0

  - name: "curl is installed"
    command: "curl"
    args: ["--version"]
    exitCode: 0

fileExistenceTests:
  - name: "tofu binary"
    path: /usr/local/bin/tofu
    shouldExist: true

  - name: "tofu config with provider mirror"
    path: /etc/tofurc
    shouldExist: true

  - name: "provider mirror directory"
    path: /usr/share/terraform/providers/registry.opentofu.org/bpg/proxmox
    shouldExist: true
